name: Check for new Pokemon TCG products

on:
  schedule:
    # Runs every 30 minutes. Adjust the cron expression as needed.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # allows manual "Run workflow" button too

permissions:
  contents: write  # needed so the workflow can commit updated state file

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_products.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seen products state"
          git push
