name: Fast check during hype windows

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hype-window-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Determine if a hype window is active
        id: hype
        run: echo "active=$(python3 check_hype_window.py)" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.hype.outputs.active == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.hype.outputs.active == 'true'
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run tracker
        if: steps.hype.outputs.active == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        if: steps.hype.outputs.active == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_products.json coolshit_coming_soon_state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seen products state (hype window)"
          git pull --rebase
          git push
